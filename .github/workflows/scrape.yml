name: Scrape Prices

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Generate static data
        run: python scripts/generate_static.py

      - name: Commit and push
        run: |
          git config user.name "price-bot"
          git config user.email "bot@example.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Update price data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
